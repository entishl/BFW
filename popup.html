<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BFW 控制中心</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="logo-area">
        <span class="logo-icon">🧠🛡️</span>
        <div class="title-group">
          <h1>Brain-Firewall</h1>
          <span class="version-tag">BFW v1.0.0</span>
        </div>
      </div>
      <button id="optionsIconBtn" class="icon-button" title="打开设置" type="button">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <main class="popup-body">
      <!-- Main Switch Card -->
      <section class="switch-card">
        <div class="switch-info">
          <span class="switch-label">工作状态</span>
          <span id="statusText" class="status-indicator enabled">运行中</span>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="enabledToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </section>

      <!-- Diagnostic Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-title">API 配置</span>
          <span id="apiStatus" class="stat-value">检测中...</span>
        </div>
        <div class="stat-card">
          <span class="stat-title">历史缓存</span>
          <span id="cacheCount" class="stat-value">0 条</span>
        </div>
      </div>

      <!-- Warning Banner -->
      <div id="apiWarning" class="warning-banner" hidden>
        ⚠️ 核心 API 尚未配置，扩展目前无法正常工作。
      </div>
    </main>

    <footer class="popup-footer">
      <button id="clearCacheBtn" class="footer-btn secondary" type="button">清空历史</button>
      <button id="openOptionsBtn" class="footer-btn primary" type="button">详细设置</button>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
