<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>赛博挚友设置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">Cyber-Buddy</p>
          <h1>赛博挚友设置</h1>
        </div>
        <button id="saveButton" class="primary-button" type="button">保存设置</button>
      </header>

      <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>

      <section class="settings-section">
        <h2>全局控制</h2>
        <label class="checkbox-label" style="margin-top: 10px; display: flex; align-items: center; gap: 8px;">
          <input id="enabledInput" type="checkbox" checked>
          <span>启用赛博挚友（关闭后扩展将完全暂停工作，不消耗任何 Token）</span>
        </label>
      </section>

      <section class="settings-section">
        <h2>API 设置</h2>
        <div class="field-grid">
          <label>
            <span>Base URL</span>
            <input id="baseUrlInput" type="url" placeholder="https://api.openai.com/v1">
          </label>
          <label>
            <span>API Key</span>
            <input id="apiKeyInput" type="password" autocomplete="off" placeholder="sk-...">
          </label>
          <label>
            <span>Model</span>
            <input id="modelInput" type="text" placeholder="gpt-4o-mini">
          </label>
          <label>
            <span>请求超时（秒）</span>
            <input id="apiTimeoutInput" type="number" min="1" max="120" step="1">
          </label>
        </div>
      </section>

      <section class="settings-section">
        <div class="section-heading">
          <div>
            <h2>分类规则</h2>
            <p class="muted" style="font-size: 13px;">如果一个页面命中多个分类，只要有一个分类不被拦截，都会被放行</p>
          </div>
          <button id="addCategoryButton" class="secondary-button" type="button">添加分类</button>
        </div>
        <p id="emptyCategoryWarning" class="warning" hidden>当前无任何分类规则，扩展已暂停工作。</p>
        <div id="categoryList" class="category-list"></div>
      </section>

      <section class="settings-section">
        <h2>AI 语气</h2>
        <label class="full-field">
          <span>劝退语气</span>
          <textarea id="toneInput" rows="3" placeholder="像一个温柔心理医生一样劝我"></textarea>
        </label>
      </section>

      <section class="settings-section">
        <h2>抓取设置</h2>
        <label class="short-field">
          <span>评论等待时间（秒）</span>
          <input id="commentTimeoutInput" type="number" min="0" max="30" step="1">
        </label>
      </section>

      <section class="settings-section">
        <div class="section-heading">
          <div>
            <h2>缓存管理</h2>
            <p class="muted">当前缓存条目数：<strong id="cacheCount">0</strong></p>
          </div>
          <button id="clearCacheButton" class="danger-button" type="button">清空所有历史记录</button>
        </div>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
